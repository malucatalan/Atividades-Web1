<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <header>
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid justify-content-center">
                <h2>
                    <img src="img/unnamed.png" alt="Logo" width="40" height="40">
                    Gerenciador de Tarefas
                </h2>
            </div>
        </nav>
    </header>

    <div class="container mt-4">
        <div class="d-flex justify-content-center gap-2 mb-4">
            <input type="text" id="tarefa" placeholder="Digite sua tarefa...">
            <button style="background-color: azure;" onclick="mostrar()">Enviar Tarefa</button>
        </div>

        <div id="lista-tarefas" class="d-flex flex-wrap gap-3 justify-content-center"></div>
    </div>

    <script>
        function mostrar() {
            let Tarefa = document.getElementById("tarefa");
            let textoTarefa = Tarefa.value;
            if (textoTarefa === "") return

            let idUnico = Date.now()

            let listaTarefas = document.getElementById("lista-tarefas");

            let novoCard = `
                <div class="card card-tarefa" style="width: 18rem; margin-bottom: 10px; background-color: aliceblue; ">
                    <div class="card-body">
                        <h5 class="card-title">${textoTarefa}</h5>
                        <h6 class="card-subtitle mb-2 text-body-secondary">Prioridade</h6>
                        <div class="btn-group" role="group">
                            
                            <input type="radio" class="btn-check" name="btnradio-${idUnico}" id="alta-${idUnico}" autocomplete="off" checked>
                            <label class="btn btn-outline-danger" for="alta-${idUnico}">Alta</label>

                            <input type="radio" class="btn-check" name="btnradio-${idUnico}" id="media-${idUnico}" autocomplete="off">
                            <label class="btn btn-outline-warning" for="media-${idUnico}">Média</label>

                            <input type="radio" class="btn-check" name="btnradio-${idUnico}" id="baixa-${idUnico}" autocomplete="off">
                            <label class="btn btn-outline-success" for="baixa-${idUnico}">Baixa</label>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById("lista-tarefas").innerHTML += novoCard;
            Tarefa.value = "";
        }
    </script>
</body>
</html>
