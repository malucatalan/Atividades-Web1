<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <header>
        <div class="barra">
            <nav class="navbar bg-body-tertiary" >
                <div>
                    <h1>
                        <img src="img/unnamed.png" alt="Logo" width="40" height="40">
                        Gerenciador de Tarefas
                    </h1>
                </div>
            </nav>
        </div>
    </header>

    <div>
        <input type="text" id="tarefa" placeholder="Digite sua tarefa...">

        <button onclick="mostrar()">Enviar Tarefa</button>
        
        <div id="lista-tarefas"></div>
    </div>

    <script>
        function mostrar() {
            let Tarefa = document.getElementById("tarefa");
            let textoTarefa = Tarefa.value;
            let listaTarefas = document.getElementById("lista-tarefas");

            let novoCard = `
                <div class="card" style="width: 18rem;">
                    <div class="card-body">
                        <h5 class="card-title">${textoTarefa}</h5>
                        <h6 class="card-subtitle mb-2 text-body-secondary">Prioridade</h6>
                        <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
                            <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked>
                            <label class="btn btn-outline-primary" for="btnradio1">Alta</label>

                            <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off">
                            <label class="btn btn-outline-primary" for="btnradio2">Média</label>

                            <input type="radio" class="btn-check" name="btnradio" id="btnradio3" autocomplete="off">
                            <label class="btn btn-outline-primary" for="btnradio3">Baixa</label>
                        </div>
                    </div>
                </div>
            `;

            listaTarefas.innerHTML += novoCard;

            Tarefa.value = "";
        }
    </script>
</body>
</html>
